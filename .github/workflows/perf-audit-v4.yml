name: Performance audit v4

on:
  push:
    paths:
      - .github/PERF_AUDIT_V4

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        id: install
        continue-on-error: true
        run: npm ci >/tmp/install.log 2>&1
      - name: Build and verify
        id: check
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_SITE_URL: https://maijamalhoon.github.io/jamal-portfolio
        run: npm run check >/tmp/check.log 2>&1
      - name: Inspect export
        id: inspect
        if: steps.check.outcome == 'success'
        continue-on-error: true
        run: |
          node <<'NODE'
          const fs=require('node:fs');
          const html=fs.readFileSync('out/index.html','utf8');
          const nextJs=(html.match(/\/_next\/static\/[^"' ]+\.js/g)||[]).length;
          const scripts=(html.match(/<script\b/gi)||[]).length;
          const portfolio=(html.match(/portfolio\.js/g)||[]).length;
          fs.writeFileSync('/tmp/export-inspect.json',JSON.stringify({bytes:Buffer.byteLength(html),nextJs,scripts,portfolio},null,2));
          NODE
      - name: Start preview
        id: server
        if: steps.check.outcome == 'success'
        continue-on-error: true
        run: |
          npm start >/tmp/server.log 2>&1 &
          for i in {1..40}; do curl -fsS http://127.0.0.1:3000/jamal-portfolio/ >/dev/null && exit 0; sleep 1; done
          exit 1
      - name: Install Lighthouse
        id: browser
        if: steps.server.outcome == 'success'
        continue-on-error: true
        run: |
          npm install --no-save --package-lock=false @playwright/test@1.55.0 lighthouse@12.8.2 >/tmp/browser.log 2>&1
          npx playwright install --with-deps chromium >>/tmp/browser.log 2>&1
      - name: Lighthouse
        id: lighthouse
        if: steps.browser.outcome == 'success'
        continue-on-error: true
        run: |
          CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/mobile.json >/tmp/lighthouse.log 2>&1
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --preset=desktop --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/desktop.json >>/tmp/lighthouse.log 2>&1
      - name: Publish report
        if: always()
        run: |
          node <<'NODE'
          const fs=require('node:fs');
          const read=p=>fs.existsSync(p)?fs.readFileSync(p,'utf8').slice(-9000):'not available';
          const score=p=>{if(!fs.existsSync(p))return null;const r=JSON.parse(fs.readFileSync(p));const c=r.categories,a=r.audits;return{performance:Math.round(c.performance.score*100),accessibility:Math.round(c.accessibility.score*100),bestPractices:Math.round(c['best-practices'].score*100),seo:Math.round(c.seo.score*100),fcp:a['first-contentful-paint'].displayValue,lcp:a['largest-contentful-paint'].displayValue,tbt:a['total-blocking-time'].displayValue,cls:a['cumulative-layout-shift'].displayValue,speedIndex:a['speed-index'].displayValue}};
          const data={outcomes:{install:'${{ steps.install.outcome }}',check:'${{ steps.check.outcome }}',inspect:'${{ steps.inspect.outcome }}',server:'${{ steps.server.outcome }}',browser:'${{ steps.browser.outcome }}',lighthouse:'${{ steps.lighthouse.outcome }}'},export:fs.existsSync('/tmp/export-inspect.json')?JSON.parse(fs.readFileSync('/tmp/export-inspect.json')):null,mobile:score('/tmp/mobile.json'),desktop:score('/tmp/desktop.json')};
          const md=`# Performance audit v4\n\n\`\`\`json\n${JSON.stringify(data,null,2)}\n\`\`\`\n\n## Check log\n\n\`\`\`text\n${read('/tmp/check.log')}\n\`\`\`\n\n## Lighthouse log\n\n\`\`\`text\n${read('/tmp/lighthouse.log')}\n\`\`\`\n`;
          fs.writeFileSync('PERF_RESULT_V4.md',md);
          NODE
          rm -f .github/PERF_AUDIT_V4 .github/workflows/perf-audit-v4.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "audit: publish performance audit v4"
          git pull --rebase origin main
          git push
