name: Final audit v8

on:
  push:
    paths:
      - .github/FINAL_AUDIT_V8

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        id: install
        continue-on-error: true
        run: npm ci >/tmp/install.log 2>&1
      - name: Build
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_SITE_URL: https://maijamalhoon.github.io/jamal-portfolio
        run: npm run check >/tmp/build.log 2>&1
      - name: Start preview
        id: server
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          npm start >/tmp/server.log 2>&1 &
          for i in {1..40}; do curl -fsS --compressed http://127.0.0.1:3000/jamal-portfolio/ >/dev/null && exit 0; sleep 1; done
          exit 1
      - name: Install browser
        id: browser
        if: steps.server.outcome == 'success'
        continue-on-error: true
        run: |
          npm install --no-save --package-lock=false @playwright/test@1.55.0 lighthouse@12.8.2 >/tmp/browser.log 2>&1
          npx playwright install --with-deps chromium >>/tmp/browser.log 2>&1
      - name: Responsive interaction audit
        id: interactions
        if: steps.browser.outcome == 'success'
        continue-on-error: true
        run: |
          cat >/tmp/ui.mjs <<'JS'
          import { chromium } from '@playwright/test';
          import { writeFile } from 'node:fs/promises';
          const browser = await chromium.launch({ headless: true });
          const results = [];
          const devices = [
            { name: 'mobile', width: 390, height: 844, screenshot: 'public/preview-mobile.png' },
            { name: 'tablet', width: 768, height: 1024 },
            { name: 'desktop', width: 1440, height: 900, screenshot: 'public/preview-desktop.png' },
          ];
          for (const device of devices) {
            const context = await browser.newContext({ viewport: { width: device.width, height: device.height } });
            const page = await context.newPage();
            const errors = [];
            page.on('pageerror', error => errors.push(`pageerror: ${error.message}`));
            try {
              await page.goto('http://127.0.0.1:3000/jamal-portfolio/', { waitUntil: 'networkidle', timeout: 30000 });
              await page.waitForTimeout(250);
              const overflow = await page.evaluate(() => document.documentElement.scrollWidth - innerWidth);
              if (overflow > 2) errors.push(`horizontal overflow ${overflow}px`);
              if (await page.locator('h1').count() !== 1) errors.push('invalid h1 count');
              const heading = await page.locator('h1').boundingBox();
              if (!heading || heading.x < -2 || heading.x + heading.width > device.width + 2) errors.push(`heading clipped ${JSON.stringify(heading)}`);
              if (!(await page.locator('.portrait-frame img').isVisible())) errors.push('hero portrait hidden');
              if (device.screenshot) await page.screenshot({ path: device.screenshot, fullPage: false });
              if (device.width <= 1050) {
                await page.locator('[data-menu-open]').click();
                await page.locator('[data-mobile-menu]').waitFor({ state: 'visible' });
                if (await page.locator('[data-menu-link]').count() !== 6) errors.push('menu row count');
                if (!(await page.locator('.menu-portrait').isVisible())) errors.push('menu portrait hidden');
                await page.locator('[data-menu-close]').click();
                await page.locator('[data-mobile-menu]').waitFor({ state: 'hidden' });
              }
              await page.locator('[data-theme-button]').click();
              await page.locator('[data-theme="cobalt"]').click();
              if (await page.locator('html').getAttribute('data-theme') !== 'cobalt') errors.push('theme switch failed');
              await page.locator('[data-contact-open]').first().click();
              await page.locator('[data-contact-modal]').waitFor({ state: 'visible' });
              if (!(await page.locator('[data-contact-modal] a', { hasText: 'Open LinkedIn' }).isVisible())) errors.push('LinkedIn action hidden');
              await page.locator('.modal-head [data-contact-close]').click();
              await page.locator('[data-contact-modal]').waitFor({ state: 'hidden' });
            } catch (error) {
              errors.push(error.stack || error.message);
            }
            results.push({ device, errors });
            await context.close();
          }
          await browser.close();
          await writeFile('/tmp/ui-results.json', JSON.stringify(results, null, 2));
          if (results.some(result => result.errors.length)) process.exit(1);
          JS
          node /tmp/ui.mjs >/tmp/ui.log 2>&1
      - name: Lighthouse mobile
        id: mobile
        if: steps.browser.outcome == 'success'
        continue-on-error: true
        run: |
          CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/mobile.json >/tmp/mobile.log 2>&1
      - name: Lighthouse desktop
        id: desktop
        if: steps.browser.outcome == 'success'
        continue-on-error: true
        run: |
          CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --preset=desktop --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/desktop.json >/tmp/desktop.log 2>&1
      - name: Publish report and previews
        if: always()
        run: |
          node <<'NODE'
          const fs=require('node:fs');
          const read=p=>fs.existsSync(p)?fs.readFileSync(p,'utf8').slice(-10000):'not available';
          const score=p=>{if(!fs.existsSync(p))return null;const r=JSON.parse(fs.readFileSync(p));const c=r.categories,a=r.audits;return{performance:Math.round(c.performance.score*100),accessibility:Math.round(c.accessibility.score*100),bestPractices:Math.round(c['best-practices'].score*100),seo:Math.round(c.seo.score*100),fcp:a['first-contentful-paint'].displayValue,lcp:a['largest-contentful-paint'].displayValue,tbt:a['total-blocking-time'].displayValue,cls:a['cumulative-layout-shift'].displayValue,speedIndex:a['speed-index'].displayValue}};
          const data={outcomes:{install:'${{ steps.install.outcome }}',build:'${{ steps.build.outcome }}',server:'${{ steps.server.outcome }}',browser:'${{ steps.browser.outcome }}',interactions:'${{ steps.interactions.outcome }}',mobile:'${{ steps.mobile.outcome }}',desktop:'${{ steps.desktop.outcome }}'},mobile:score('/tmp/mobile.json'),desktop:score('/tmp/desktop.json'),interactions:fs.existsSync('/tmp/ui-results.json')?JSON.parse(fs.readFileSync('/tmp/ui-results.json')):null};
          const md=`# Final verified portfolio audit\n\n\`\`\`json\n${JSON.stringify(data,null,2)}\n\`\`\`\n\n## UI log\n\n\`\`\`text\n${read('/tmp/ui.log')}\n\`\`\`\n`;
          fs.writeFileSync('FINAL_VERIFICATION.md',md);
          NODE
          rm -f .github/FINAL_AUDIT_V8 .github/workflows/final-audit-v8.yml PERF_RESULT_V7.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "audit: publish final UI previews and performance verification"
          git pull --rebase origin main
          git push
