name: Final global portfolio audit

on:
  push:
    paths:
      - .github/FINAL_AUDIT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        id: install
        continue-on-error: true
        run: npm ci

      - name: Audit production dependencies
        id: security
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          npm audit --omit=dev --audit-level=high --json > /tmp/npm-audit.json || true
          node <<'NODE'
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync('/tmp/npm-audit.json', 'utf8'));
          const totals = report.metadata?.vulnerabilities ?? {};
          const high = Number(totals.high ?? 0);
          const critical = Number(totals.critical ?? 0);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `high=${high}\ncritical=${critical}\n`);
          if (high > 0 || critical > 0) process.exitCode = 1;
          NODE

      - name: Lint, build and type-check
        id: verify
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_ACTIONS: "false"
          NEXT_PUBLIC_SITE_URL: https://maijamalhoon.github.io/jamal-portfolio
        run: npm run check

      - name: Audit generated static release
        id: static
        if: steps.verify.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          required=(
            out/index.html
            out/404.html
            out/resume/index.html
            out/manifest.webmanifest
            out/robots.txt
            out/sitemap.xml
            out/icon.svg
            out/Jamal_Yaqoob_Resume.pdf
            out/Jamal_Yaqoob.vcf
          )
          for file in "${required[@]}"; do
            test -s "$file"
          done
          test "$(grep -o '<h1' out/index.html | wc -l | tr -d ' ')" = "1"
          test "$(grep -o '<h1' out/resume/index.html | wc -l | tr -d ' ')" = "1"
          ! grep -RIE --exclude-dir=node_modules --exclude-dir=out --exclude='*.md' \
            'window\.alert|(^|[^[:alnum:]_])alert\(|(^|[^[:alnum:]_])confirm\(|(^|[^[:alnum:]_])prompt\(|window\.print|<select([[:space:]>])' \
            src scripts public

      - name: Start production preview
        id: server
        if: steps.static.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          npm start > /tmp/portfolio-server.log 2>&1 &
          echo $! > /tmp/portfolio-server.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/portfolio-server.log
          exit 1

      - name: Audit public routes and assets
        id: http
        if: steps.server.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          for route in / /resume/ /manifest.webmanifest /robots.txt /sitemap.xml /icon.svg /Jamal_Yaqoob_Resume.pdf /Jamal_Yaqoob.vcf; do
            status="$(curl --silent --output /dev/null --write-out '%{http_code}' "http://127.0.0.1:3000$route")"
            test "$status" = "200"
          done
          status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:3000/route-that-does-not-exist/)"
          test "$status" = "404"

      - name: Install browser audit tools
        id: browser_tools
        if: steps.http.outcome == 'success'
        continue-on-error: true
        run: |
          npm install --no-save --package-lock=false @playwright/test@1.55.0 lighthouse@12.8.2
          npx playwright install --with-deps chromium

      - name: Run responsive interaction smoke tests
        id: browser
        if: steps.browser_tools.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          cat > browser-audit.mjs <<'JS'
          import { chromium } from '@playwright/test';
          import { writeFile } from 'node:fs/promises';

          const baseURL = 'http://127.0.0.1:3000';
          const viewports = [
            { name: 'mobile', width: 390, height: 844 },
            { name: 'tablet', width: 768, height: 1024 },
            { name: 'desktop', width: 1440, height: 900 },
          ];
          const results = [];
          const browser = await chromium.launch({ headless: true });

          for (const viewport of viewports) {
            const context = await browser.newContext({
              viewport: { width: viewport.width, height: viewport.height },
              reducedMotion: 'no-preference',
            });
            const page = await context.newPage();
            const errors = [];
            page.on('pageerror', error => errors.push(`pageerror: ${error.message}`));
            page.on('console', message => {
              if (message.type() === 'error') errors.push(`console: ${message.text()}`);
            });

            await page.goto(baseURL, { waitUntil: 'domcontentloaded', timeout: 30000 });
            await page.waitForTimeout(1800);

            const h1Count = await page.locator('h1').count();
            if (h1Count !== 1) errors.push(`expected one h1, found ${h1Count}`);

            const overflow = await page.evaluate(() => document.documentElement.scrollWidth - window.innerWidth);
            if (overflow > 2) errors.push(`horizontal overflow: ${overflow}px`);

            const unsafeBlankLinks = await page.locator('a[target="_blank"]:not([rel~="noreferrer"])').count();
            if (unsafeBlankLinks) errors.push(`unsafe target=_blank links: ${unsafeBlankLinks}`);

            const linkedinCard = page.locator('.linkedin-profile-card');
            if (await linkedinCard.count() !== 1) errors.push('LinkedIn profile card missing');

            await page.waitForTimeout(1200);
            const repoNames = await page.locator('.github-repo-card h3').allTextContents();
            if (repoNames.some(name => name.trim().toLowerCase() === 'jamal-portfolio')) {
              errors.push('current portfolio repository appears in curated GitHub feed');
            }

            if (viewport.width <= 1100) {
              await page.locator('.mobile-menu-button').click();
              await page.locator('.mobile-menu').waitFor({ state: 'visible' });
              const menuLabels = (await page.locator('.mobile-menu-links a').allTextContents()).join(' ');
              if (!menuLabels.includes('Profiles')) errors.push('Profiles navigation item missing from mobile menu');
              if (await page.locator('.mobile-contact-action').isVisible()) errors.push('duplicate Contact actions row is visible');
              await page.locator('.mobile-menu-close').click();
              await page.locator('.mobile-menu').waitFor({ state: 'detached' });
            } else {
              if (!(await page.locator('.desktop-nav a', { hasText: 'Profiles' }).isVisible())) {
                errors.push('Profiles navigation item missing from desktop menu');
              }
            }

            await page.locator('.theme-trigger').click();
            await page.getByRole('menuitemradio', { name: 'Cobalt' }).click();
            const theme = await page.locator('html').getAttribute('data-theme');
            if (theme !== 'cobalt') errors.push(`theme switch failed: ${theme}`);

            await page.locator('.hero-contact-link').click();
            await page.locator('.contact-panel').waitFor({ state: 'visible' });
            if (!(await page.locator('.contact-panel a', { hasText: 'Open LinkedIn' }).isVisible())) {
              errors.push('LinkedIn action missing from contact panel');
            }
            await page.getByRole('button', { name: 'Close contact panel' }).click();
            await page.locator('.contact-panel').waitFor({ state: 'detached' });

            results.push({ viewport, errors });
            await context.close();
          }

          await browser.close();
          await writeFile('/tmp/browser-results.json', JSON.stringify(results, null, 2));
          const failures = results.flatMap(result => result.errors.map(error => `${result.viewport.name}: ${error}`));
          if (failures.length) {
            console.error(failures.join('\n'));
            process.exit(1);
          }
          console.log('Responsive interaction smoke tests passed');
          JS
          node browser-audit.mjs

      - name: Run Lighthouse mobile and desktop audits
        id: lighthouse
        if: steps.browser.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          npx lighthouse http://127.0.0.1:3000/ \
            --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json --output-path=/tmp/lighthouse-mobile.json
          npx lighthouse http://127.0.0.1:3000/ \
            --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" \
            --preset=desktop --only-categories=performance,accessibility,best-practices,seo \
            --output=json --output-path=/tmp/lighthouse-desktop.json
          node <<'NODE'
          const fs = require('node:fs');
          function scores(path) {
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            return Object.fromEntries(Object.entries(report.categories).map(([key, value]) => [key, Math.round(value.score * 100)]));
          }
          const mobile = scores('/tmp/lighthouse-mobile.json');
          const desktop = scores('/tmp/lighthouse-desktop.json');
          for (const [prefix, values] of [['mobile', mobile], ['desktop', desktop]]) {
            for (const [key, value] of Object.entries(values)) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `${prefix}_${key.replaceAll('-', '_')}=${value}\n`);
            }
          }
          console.log({ mobile, desktop });
          NODE

      - name: Enforce global quality thresholds
        id: thresholds
        if: steps.lighthouse.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.lighthouse.outputs.mobile_performance }}" -ge 75
          test "${{ steps.lighthouse.outputs.desktop_performance }}" -ge 85
          test "${{ steps.lighthouse.outputs.mobile_accessibility }}" -ge 95
          test "${{ steps.lighthouse.outputs.desktop_accessibility }}" -ge 95
          test "${{ steps.lighthouse.outputs.mobile_best_practices }}" -ge 90
          test "${{ steps.lighthouse.outputs.desktop_best_practices }}" -ge 90
          test "${{ steps.lighthouse.outputs.mobile_seo }}" -ge 95
          test "${{ steps.lighthouse.outputs.desktop_seo }}" -ge 95

      - name: Write final audit report
        if: always()
        shell: bash
        run: |
          cat > FINAL_AUDIT.md <<EOF
          # Final Global Portfolio Audit

          Audited against commit: \`$GITHUB_SHA\`

          ## Automated verification

          | Check | Result |
          |---|---|
          | Locked dependency installation | ${{ steps.install.outcome }} |
          | Production dependency security audit | ${{ steps.security.outcome }} |
          | ESLint, production build and TypeScript | ${{ steps.verify.outcome }} |
          | Generated static release and semantic checks | ${{ steps.static.outcome }} |
          | Production preview server | ${{ steps.server.outcome }} |
          | Public routes, downloads and custom 404 | ${{ steps.http.outcome }} |
          | Responsive browser interaction tests | ${{ steps.browser.outcome }} |
          | Lighthouse mobile and desktop | ${{ steps.lighthouse.outcome }} |
          | Enforced global quality thresholds | ${{ steps.thresholds.outcome }} |

          ## Lighthouse scores

          | Mode | Performance | Accessibility | Best Practices | SEO |
          |---|---:|---:|---:|---:|
          | Mobile | ${{ steps.lighthouse.outputs.mobile_performance || 'n/a' }} | ${{ steps.lighthouse.outputs.mobile_accessibility || 'n/a' }} | ${{ steps.lighthouse.outputs.mobile_best_practices || 'n/a' }} | ${{ steps.lighthouse.outputs.mobile_seo || 'n/a' }} |
          | Desktop | ${{ steps.lighthouse.outputs.desktop_performance || 'n/a' }} | ${{ steps.lighthouse.outputs.desktop_accessibility || 'n/a' }} | ${{ steps.lighthouse.outputs.desktop_best_practices || 'n/a' }} | ${{ steps.lighthouse.outputs.desktop_seo || 'n/a' }} |

          ## Security

          - High-severity production dependency vulnerabilities: ${{ steps.security.outputs.high || 'n/a' }}
          - Critical production dependency vulnerabilities: ${{ steps.security.outputs.critical || 'n/a' }}

          ## Interaction coverage

          - Mobile, tablet and desktop viewport smoke tests
          - Horizontal overflow detection
          - Mobile menu open/close and duplicate-row prevention
          - Desktop and mobile Profiles navigation
          - Theme switching
          - Contact dialog and LinkedIn action
          - Current portfolio repository exclusion from the live GitHub feed
          - Safe external-link attributes
          - Static résumé, PDF, vCard, icon, manifest, sitemap, robots and custom 404 routes
          - No native alert, confirm, prompt, select or print-dialog dependency
          EOF

      - name: Publish audit result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          install="${{ steps.install.outcome }}"
          security="${{ steps.security.outcome }}"
          verify="${{ steps.verify.outcome }}"
          static="${{ steps.static.outcome }}"
          server="${{ steps.server.outcome }}"
          http="${{ steps.http.outcome }}"
          browser="${{ steps.browser.outcome }}"
          lighthouse="${{ steps.lighthouse.outcome }}"
          thresholds="${{ steps.thresholds.outcome }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ "$install" == success && "$security" == success && "$verify" == success && "$static" == success && "$server" == success && "$http" == success && "$browser" == success && "$lighthouse" == success && "$thresholds" == success ]]; then
            rm -f .github/FINAL_AUDIT .github/workflows/final-audit.yml browser-audit.mjs
            git add -A
            git commit -m "audit: certify final global portfolio release"
            git pull --rebase origin main
            git push
          else
            rm -f browser-audit.mjs
            git add FINAL_AUDIT.md
            git commit -m "audit: record final portfolio findings"
            git pull --rebase origin main
            git push
            exit 1
          fi
