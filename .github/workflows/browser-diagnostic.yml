name: Browser audit diagnostic

on:
  push:
    paths:
      - .github/BROWSER_DIAGNOSTIC

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build root-path production release
        env:
          GITHUB_ACTIONS: "false"
          NEXT_PUBLIC_SITE_URL: https://maijamalhoon.github.io/jamal-portfolio
        run: npm run build
      - name: Start preview
        run: |
          npm start > /tmp/server.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:3000/ >/dev/null && exit 0; sleep 1; done
          cat /tmp/server.log
          exit 1
      - name: Install browser
        run: |
          npm install --no-save --package-lock=false @playwright/test@1.55.0
          npx playwright install --with-deps chromium
      - name: Diagnose interactions
        continue-on-error: true
        shell: bash
        run: |
          cat > browser-diagnostic.mjs <<'JS'
          import { chromium } from '@playwright/test';
          import { writeFile } from 'node:fs/promises';

          const rows = [];
          const browser = await chromium.launch({ headless: true });
          for (const viewport of [
            { name: 'mobile', width: 390, height: 844 },
            { name: 'tablet', width: 768, height: 1024 },
            { name: 'desktop', width: 1440, height: 900 },
          ]) {
            const context = await browser.newContext({ viewport, reducedMotion: 'no-preference' });
            const page = await context.newPage();
            const notes = [];
            page.on('pageerror', error => notes.push(`pageerror: ${error.message}`));
            page.on('console', message => { if (message.type() === 'error') notes.push(`console: ${message.text()}`); });
            try {
              await page.goto('http://127.0.0.1:3000', { waitUntil: 'domcontentloaded', timeout: 30000 });
              await page.waitForTimeout(2500);
              notes.push(`h1=${await page.locator('h1').count()}`);
              notes.push(`overflow=${await page.evaluate(() => document.documentElement.scrollWidth - innerWidth)}`);
              notes.push(`linkedinCards=${await page.locator('.linkedin-profile-card').count()}`);
              notes.push(`repoNames=${JSON.stringify(await page.locator('.github-repo-card h3').allTextContents())}`);
              if (viewport.width <= 1100) {
                await page.locator('.mobile-menu-button').click();
                await page.locator('.mobile-menu').waitFor({ state: 'visible' });
                notes.push(`menu=${JSON.stringify(await page.locator('.mobile-menu-links a').allTextContents())}`);
                notes.push(`duplicateVisible=${await page.locator('.mobile-contact-action').isVisible()}`);
                await page.locator('.mobile-menu-close').click();
                await page.locator('.mobile-menu').waitFor({ state: 'detached' });
              } else {
                notes.push(`desktopProfilesVisible=${await page.locator('.desktop-nav a', { hasText: 'Profiles' }).isVisible()}`);
              }
              await page.locator('.theme-trigger').click();
              notes.push(`themeOptions=${JSON.stringify(await page.getByRole('menuitemradio').allTextContents())}`);
              await page.getByRole('menuitemradio', { name: 'Cobalt' }).click();
              notes.push(`theme=${await page.locator('html').getAttribute('data-theme')}`);
              await page.locator('.hero-contact-link').click();
              await page.locator('.contact-panel').waitFor({ state: 'visible' });
              notes.push(`contactLinkedIn=${await page.locator('.contact-panel a', { hasText: 'Open LinkedIn' }).isVisible()}`);
              await page.getByRole('button', { name: 'Close contact panel' }).click();
              await page.locator('.contact-panel').waitFor({ state: 'detached' });
              notes.push('completed=true');
            } catch (error) {
              notes.push(`EXCEPTION: ${error?.stack ?? error}`);
            }
            rows.push({ viewport, notes });
            await context.close();
          }
          await browser.close();
          await writeFile('/tmp/browser-diagnostic.json', JSON.stringify(rows, null, 2));
          console.log(JSON.stringify(rows, null, 2));
          JS
          node browser-diagnostic.mjs 2>&1 | tee /tmp/browser-diagnostic.log
      - name: Publish diagnostic
        if: always()
        run: |
          {
            echo '# Browser Audit Diagnostic'
            echo
            echo '```text'
            cat /tmp/browser-diagnostic.log 2>/dev/null || echo 'No diagnostic log generated.'
            echo '```'
          } > BROWSER_DIAGNOSTIC.md
          rm -f browser-diagnostic.mjs .github/BROWSER_DIAGNOSTIC .github/workflows/browser-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "audit: publish browser diagnostic"
          git pull --rebase origin main
          git push
