name: Performance audit v6

on:
  push:
    paths:
      - .github/PERF_AUDIT_V6

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        id: install
        continue-on-error: true
        run: npm ci >/tmp/install.log 2>&1
      - name: Build
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_SITE_URL: https://maijamalhoon.github.io/jamal-portfolio
        run: npm run check >/tmp/build.log 2>&1
      - name: Inspect
        id: inspect
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          node <<'NODE'
          const fs=require('node:fs');const html=fs.readFileSync('out/index.html','utf8');const data={bytes:Buffer.byteLength(html),nextJs:(html.match(/\/_next\/static\/[^"' ]+\.js/g)||[]).length,scripts:(html.match(/<script\b/gi)||[]).length,styles:(html.match(/<style\b/gi)||[]).length,stylesheets:(html.match(/rel=["']stylesheet["']/gi)||[]).length,portfolio:(html.match(/portfolio\.js/g)||[]).length};fs.writeFileSync('/tmp/export.json',JSON.stringify(data,null,2));console.log(data);
          NODE
          node --check public/portfolio.js
      - name: Start preview
        id: server
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          npm start >/tmp/server.log 2>&1 &
          for i in {1..40}; do curl -fsS http://127.0.0.1:3000/jamal-portfolio/ >/dev/null && exit 0; sleep 1; done
          cat /tmp/server.log
          exit 1
      - name: Install browser
        id: browser
        if: steps.server.outcome == 'success'
        continue-on-error: true
        run: |
          npm install --no-save --package-lock=false @playwright/test@1.55.0 lighthouse@12.8.2 >/tmp/browser.log 2>&1
          npx playwright install --with-deps chromium >>/tmp/browser.log 2>&1
      - name: Browser diagnostic
        id: interactions
        if: steps.browser.outcome == 'success'
        continue-on-error: true
        run: |
          cat >/tmp/interactions.mjs <<'JS'
          import { chromium } from '@playwright/test';import{writeFile}from'node:fs/promises';
          const browser=await chromium.launch({headless:true});const results=[];
          for(const viewport of [{name:'mobile',width:390,height:844},{name:'tablet',width:768,height:1024},{name:'desktop',width:1440,height:900}]){const page=await browser.newPage({viewport});const notes=[];page.on('pageerror',e=>notes.push(`pageerror: ${e.message}`));page.on('console',m=>{if(m.type()==='error')notes.push(`console: ${m.text()}`)});try{await page.goto('http://127.0.0.1:3000/jamal-portfolio/',{waitUntil:'networkidle',timeout:30000});notes.push(`scripts=${await page.locator('script').count()}`);notes.push(`h1=${await page.locator('h1').count()}`);notes.push(`overflow=${await page.evaluate(()=>document.documentElement.scrollWidth-innerWidth)}`);notes.push(`themeButton=${await page.locator('[data-theme-button]').count()}`);if(viewport.width<=1050){await page.locator('[data-menu-open]').click({timeout:10000});await page.locator('[data-mobile-menu]').waitFor({state:'visible',timeout:10000});notes.push(`menuLinks=${await page.locator('[data-menu-link]').count()}`);await page.locator('[data-menu-close]').click();}await page.locator('[data-theme-button]').click();await page.locator('[data-theme="cobalt"]').click();notes.push(`theme=${await page.locator('html').getAttribute('data-theme')}`);await page.locator('[data-contact-open]').first().click();await page.locator('[data-contact-modal]').waitFor({state:'visible',timeout:10000});notes.push('modal=visible');await page.locator('[data-contact-close]').last().click();}catch(error){notes.push(`EXCEPTION: ${error.stack||error.message}`)}results.push({viewport,notes});await page.close();}
          await browser.close();await writeFile('/tmp/interactions.json',JSON.stringify(results,null,2));console.log(results);
          JS
          node /tmp/interactions.mjs >/tmp/interactions.log 2>&1
      - name: Lighthouse mobile
        id: mobile
        if: steps.browser.outcome == 'success'
        continue-on-error: true
        run: |
          CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/mobile.json >/tmp/mobile.log 2>&1
      - name: Lighthouse desktop
        id: desktop
        if: steps.browser.outcome == 'success'
        continue-on-error: true
        run: |
          CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --preset=desktop --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/desktop.json >/tmp/desktop.log 2>&1
      - name: Publish diagnostic
        if: always()
        run: |
          node <<'NODE'
          const fs=require('node:fs');const read=p=>fs.existsSync(p)?fs.readFileSync(p,'utf8').slice(-12000):'not available';const score=p=>{if(!fs.existsSync(p))return null;const r=JSON.parse(fs.readFileSync(p));const c=r.categories,a=r.audits;return{performance:Math.round(c.performance.score*100),accessibility:Math.round(c.accessibility.score*100),bestPractices:Math.round(c['best-practices'].score*100),seo:Math.round(c.seo.score*100),fcp:a['first-contentful-paint'].displayValue,lcp:a['largest-contentful-paint'].displayValue,tbt:a['total-blocking-time'].displayValue,cls:a['cumulative-layout-shift'].displayValue,speedIndex:a['speed-index'].displayValue,failed:Object.values(a).filter(x=>x.score!==null&&x.score<1&&x.scoreDisplayMode!=='notApplicable').sort((x,y)=>(x.score??0)-(y.score??0)).slice(0,30).map(x=>({id:x.id,title:x.title,score:x.score,displayValue:x.displayValue}))}};const data={outcomes:{install:'${{ steps.install.outcome }}',build:'${{ steps.build.outcome }}',inspect:'${{ steps.inspect.outcome }}',server:'${{ steps.server.outcome }}',browser:'${{ steps.browser.outcome }}',interactions:'${{ steps.interactions.outcome }}',mobile:'${{ steps.mobile.outcome }}',desktop:'${{ steps.desktop.outcome }}'},export:fs.existsSync('/tmp/export.json')?JSON.parse(fs.readFileSync('/tmp/export.json')):null,mobile:score('/tmp/mobile.json'),desktop:score('/tmp/desktop.json')};const md=`# Performance audit v6\n\n\`\`\`json\n${JSON.stringify(data,null,2)}\n\`\`\`\n\n## Browser diagnostic\n\n\`\`\`json\n${read('/tmp/interactions.json')}\n\`\`\`\n\n## Build log\n\n\`\`\`text\n${read('/tmp/build.log')}\n\`\`\`\n\n## Mobile log\n\n\`\`\`text\n${read('/tmp/mobile.log')}\n\`\`\`\n`;fs.writeFileSync('PERF_RESULT_V6.md',md);
          NODE
          rm -f .github/PERF_AUDIT_V6 .github/workflows/perf-audit-v6.yml PERF_RESULT_V5.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "audit: publish performance diagnostic v6"
          git pull --rebase origin main
          git push
