name: Apply Final Portfolio Release

on:
  push:
    paths:
      - release-payload/READY
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore audited project
        shell: bash
        run: |
          set -euo pipefail
          cat release-payload/archive/*.part | base64 --decode > /tmp/jamal-portfolio-release.tar.gz
          echo "28f947d00c2db89010f63b1ba9a0cd248d1cf8ceeec28dd4a9a869992f338d36  /tmp/jamal-portfolio-release.tar.gz" | sha256sum --check
          tar -xzf /tmp/jamal-portfolio-release.tar.gz -C .

      - name: Install dependencies
        run: npm ci

      - name: Verify audited release
        run: npm run check

      - name: Commit final portfolio
        shell: bash
        run: |
          set -euo pipefail
          rm -rf audit-payload release-payload .github/workflows/apply-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: complete HR-ready portfolio and live professional integrations"
          git push
