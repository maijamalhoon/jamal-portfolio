name: Apply Final Portfolio Release

on:
  push:
    paths:
      - release2-payload/READY2
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify archive integrity
        shell: bash
        run: |
          set -euo pipefail
          cat release2-payload/archive/*.part | base64 --decode > /tmp/jamal-portfolio-release.tar.gz
          actual="$(sha256sum /tmp/jamal-portfolio-release.tar.gz | awk '{print $1}')"
          printf '%s\n' "$actual" > release2-payload/RESULT
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release2-payload/RESULT
          git commit -m "build: record release archive integrity"
          git push
          test "$actual" = "8c71628b818342a9648ac014fe07574f34a1d9cb91ddddc477bd55e68638d36f"

      - name: Restore verified project
        run: tar -xzf /tmp/jamal-portfolio-release.tar.gz -C .

      - name: Generate deterministic lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Verify audited release
        run: npm run check

      - name: Commit final portfolio
        shell: bash
        run: |
          set -euo pipefail
          rm -rf audit-payload release-payload release2-payload .github/workflows/apply-audit.yml
          git add -A
          git commit -m "feat: complete HR-ready portfolio and live professional integrations"
          git push
