name: Apply Portfolio Audit

on:
  push:
    paths:
      - audit-payload/READY
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore audited project
        shell: bash
        run: |
          set -euo pipefail
          cat audit-payload/archive/*.part | base64 --decode > /tmp/jamal-portfolio-audit.tar.gz
          echo "5bb4fac80a608b24f4f810bd1c6ff7688cc0c357b30a583afc561c10b6db38b1  /tmp/jamal-portfolio-audit.tar.gz" | sha256sum --check
          tar -xzf /tmp/jamal-portfolio-audit.tar.gz -C .

      - name: Install dependencies
        run: npm ci

      - name: Verify audit
        run: npm run check

      - name: Commit audited portfolio
        shell: bash
        run: |
          set -euo pipefail
          rm -rf audit-payload .github/workflows/apply-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: complete portfolio functionality and production audit"
          git push
