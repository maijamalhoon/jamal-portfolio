name: Agent diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture-check-output:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Capture quality check
        shell: bash
        run: |
          set +e
          npm run check > diagnostic.log 2>&1
          status=$?
          printf '%s\n' "$status" > diagnostic-status.txt
          exit 0

      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-check-output
          path: |
            diagnostic.log
            diagnostic-status.txt
          if-no-files-found: error
          retention-days: 1
