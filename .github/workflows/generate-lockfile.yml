name: Generate dependency lockfile

on:
  push:
    paths:
      - .github/GENERATE_LOCKFILE
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit deterministic lockfile
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/GENERATE_LOCKFILE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/GENERATE_LOCKFILE
          git commit -m "chore: add deterministic dependency lockfile"
          git push
