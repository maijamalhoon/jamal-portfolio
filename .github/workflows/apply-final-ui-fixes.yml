name: Apply final UI fixes

on:
  push:
    paths:
      - .github/APPLY_FINAL_UI_FIXES

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Patch source
        shell: python
        run: |
          from pathlib import Path
          page = Path('src/app/page.tsx')
          text = page.read_text()
          patches = [
            ('<button className="theme-button" type="button" data-theme-button aria-label="Choose color theme" aria-haspopup="menu" aria-expanded="false">', '<button className="theme-button" type="button" data-theme-button aria-haspopup="menu" aria-expanded="false">'),
            ('<img className="menu-portrait" src={`${basePath}/jamal-yaqoob.webp`} width="410" height="615" alt="" aria-hidden="true"/>', '<div className="menu-portrait" style={{ backgroundImage: `url(${basePath}/jamal-yaqoob.webp)` }} aria-hidden="true"/>'),
          ]
          for old, new in patches:
              if old not in text:
                  raise SystemExit(f'Missing page target: {old[:100]}')
              text = text.replace(old, new, 1)
          page.write_text(text)

          css_path = Path('src/app/portfolio.css')
          css = css_path.read_text()
          old = '.menu-portrait{position:fixed;right:-6%;bottom:-7%;width:min(68vw,500px);height:auto;opacity:.22;filter:grayscale(.1);mask-image:linear-gradient(to top,black 55%,transparent)}'
          new = '.menu-portrait{position:fixed;right:-6%;bottom:-7%;width:min(68vw,500px);aspect-ratio:2/3;background-position:center 15%;background-size:cover;background-repeat:no-repeat;opacity:.22;filter:grayscale(.1);mask-image:linear-gradient(to top,black 55%,transparent)}'
          if old not in css:
              raise SystemExit('Missing CSS target')
          css_path.write_text(css.replace(old, new, 1))
      - name: Verify build
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_SITE_URL: https://maijamalhoon.github.io/jamal-portfolio
        run: |
          npm ci
          npm run check
          node --check public/portfolio.js
      - name: Commit verified fixes
        run: |
          rm -f .github/APPLY_FINAL_UI_FIXES .github/workflows/apply-final-ui-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: finalize mobile menu portrait and accessible theme control"
          git pull --rebase origin main
          git push
