name: Performance audit v5

on:
  push:
    paths:
      - .github/PERF_AUDIT_V5

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install and build
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_SITE_URL: https://maijamalhoon.github.io/jamal-portfolio
        run: |
          npm ci
          npm run check
      - name: Inspect optimized export
        run: |
          node <<'NODE'
          const fs=require('node:fs');
          const html=fs.readFileSync('out/index.html','utf8');
          const data={bytes:Buffer.byteLength(html),nextJs:(html.match(/\/_next\/static\/[^"' ]+\.js/g)||[]).length,scripts:(html.match(/<script\b/gi)||[]).length,styles:(html.match(/<style\b/gi)||[]).length,stylesheets:(html.match(/rel=["']stylesheet["']/gi)||[]).length,portfolio:(html.match(/portfolio\.js/g)||[]).length};
          fs.writeFileSync('/tmp/export.json',JSON.stringify(data,null,2));
          console.log(data);
          if(data.nextJs!==0) process.exit(1);
          NODE
      - name: Start preview
        run: |
          npm start >/tmp/server.log 2>&1 &
          for i in {1..40}; do curl -fsS http://127.0.0.1:3000/jamal-portfolio/ >/dev/null && exit 0; sleep 1; done
          cat /tmp/server.log
          exit 1
      - name: Install audit browser
        run: |
          npm install --no-save --package-lock=false @playwright/test@1.55.0 lighthouse@12.8.2
          npx playwright install --with-deps chromium
      - name: Responsive interaction verification
        run: |
          cat >/tmp/interactions.mjs <<'JS'
          import { chromium } from '@playwright/test';
          const browser=await chromium.launch({headless:true});
          const errors=[];
          for(const viewport of [{name:'mobile',width:390,height:844},{name:'tablet',width:768,height:1024},{name:'desktop',width:1440,height:900}]){
            const page=await browser.newPage({viewport});
            page.on('pageerror',e=>errors.push(`${viewport.name}: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error') errors.push(`${viewport.name}: console ${m.text()}`)});
            await page.goto('http://127.0.0.1:3000/jamal-portfolio/',{waitUntil:'networkidle'});
            const overflow=await page.evaluate(()=>document.documentElement.scrollWidth-innerWidth);
            if(overflow>2) errors.push(`${viewport.name}: overflow ${overflow}`);
            if(await page.locator('h1').count()!==1) errors.push(`${viewport.name}: h1`);
            if(viewport.width<=1050){await page.locator('[data-menu-open]').click();await page.locator('[data-mobile-menu]').waitFor({state:'visible'});if(await page.locator('[data-menu-link]').count()!==6) errors.push(`${viewport.name}: menu rows`);await page.locator('[data-menu-close]').click();}
            await page.locator('[data-theme-button]').click();await page.locator('[data-theme="cobalt"]').click();if(await page.locator('html').getAttribute('data-theme')!=='cobalt') errors.push(`${viewport.name}: theme`);
            await page.locator('[data-contact-open]').first().click();await page.locator('[data-contact-modal]').waitFor({state:'visible'});await page.locator('[data-contact-close]').last().click();await page.locator('[data-contact-modal]').waitFor({state:'hidden'});
            await page.close();
          }
          await browser.close();
          if(errors.length){console.error(errors.join('\n'));process.exit(1)}
          console.log('Responsive interactions passed');
          JS
          node /tmp/interactions.mjs
      - name: Lighthouse mobile and desktop
        run: |
          CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/mobile.json
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --preset=desktop --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/desktop.json
      - name: Publish verified results
        if: always()
        run: |
          node <<'NODE'
          const fs=require('node:fs');
          const score=p=>{if(!fs.existsSync(p))return null;const r=JSON.parse(fs.readFileSync(p));const c=r.categories,a=r.audits;const failed=Object.values(a).filter(x=>x.score!==null&&x.score<1&&x.scoreDisplayMode!=='notApplicable').sort((x,y)=>(x.score??0)-(y.score??0)).slice(0,20).map(x=>({id:x.id,title:x.title,score:x.score,displayValue:x.displayValue}));return{performance:Math.round(c.performance.score*100),accessibility:Math.round(c.accessibility.score*100),bestPractices:Math.round(c['best-practices'].score*100),seo:Math.round(c.seo.score*100),fcp:a['first-contentful-paint'].displayValue,lcp:a['largest-contentful-paint'].displayValue,tbt:a['total-blocking-time'].displayValue,cls:a['cumulative-layout-shift'].displayValue,speedIndex:a['speed-index'].displayValue,failed}};
          const data={export:fs.existsSync('/tmp/export.json')?JSON.parse(fs.readFileSync('/tmp/export.json')):null,mobile:score('/tmp/mobile.json'),desktop:score('/tmp/desktop.json')};
          fs.writeFileSync('PERF_RESULT_V5.md',`# Performance audit v5\n\n\`\`\`json\n${JSON.stringify(data,null,2)}\n\`\`\`\n`);
          NODE
          rm -f .github/PERF_AUDIT_V5 .github/workflows/perf-audit-v5.yml PERF_RESULT_V4.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "audit: publish zero-runtime performance results"
          git pull --rebase origin main
          git push
