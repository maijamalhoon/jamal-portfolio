name: Assemble Portfolio Sources

on:
  push:
    paths:
      - source-chunks/READY

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble source files
        shell: bash
        run: |
          set -euo pipefail
          test "$(find source-chunks/portfolio -name '*.part' | wc -l)" -eq 4
          test "$(find source-chunks/styles -name '*.part' | wc -l)" -eq 8
          mkdir -p src/components src/app
          cat source-chunks/portfolio/*.part > src/components/portfolio-page.tsx
          cat source-chunks/styles/*.part > src/app/globals.css

      - name: Commit assembled sources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf source-chunks .github/workflows/assemble-sources.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add complete animated portfolio experience"
          git push
