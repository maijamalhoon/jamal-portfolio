name: Capture Vercel public URL

on:
  push:
    paths:
      - .github/CAPTURE_VERCEL_URL
  workflow_dispatch:

permissions:
  contents: write
  deployments: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find successful Vercel deployment URL
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          found=""
          while read -r deployment_id; do
            [ -n "$deployment_id" ] || continue
            status_json="$(gh api "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses?per_page=10")"
            candidate="$(printf '%s' "$status_json" | jq -r '[.[] | select(.state == "success") | (.environment_url // empty), (.target_url // empty)] | map(select(test("vercel\\.app"))) | .[0] // empty')"
            if [ -n "$candidate" ]; then
              found="$candidate"
              break
            fi
          done < <(gh api "repos/${GITHUB_REPOSITORY}/deployments?per_page=50" --jq '.[].id')

          if [ -z "$found" ]; then
            echo "No public Vercel environment URL found" >&2
            exit 1
          fi

          printf '%s\n' "$found" > VERCEL_URL.txt
          echo "Captured $found"

      - name: Commit captured URL and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/CAPTURE_VERCEL_URL .github/workflows/capture-vercel-url.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: record verified Vercel production URL"
          git push
