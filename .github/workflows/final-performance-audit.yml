name: Final performance audit

on:
  push:
    paths:
      - .github/FINAL_PERFORMANCE_AUDIT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Verify production source
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_SITE_URL: https://maijamalhoon.github.io/jamal-portfolio
        run: npm run check
      - name: Start production preview
        run: |
          npm start > /tmp/portfolio-server.log 2>&1 &
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:3000/jamal-portfolio/ > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/portfolio-server.log
          exit 1
      - name: Install browser audit tools
        run: |
          npm install --no-save --package-lock=false @playwright/test@1.55.0 lighthouse@12.8.2
          npx playwright install --with-deps chromium
      - name: Audit responsive interactions
        run: |
          cat > /tmp/interaction-audit.mjs <<'JS'
          import { chromium } from '@playwright/test';
          const browser = await chromium.launch({ headless: true });
          const errors = [];
          for (const viewport of [{name:'mobile',width:390,height:844},{name:'tablet',width:768,height:1024},{name:'desktop',width:1440,height:900}]) {
            const page = await browser.newPage({ viewport });
            page.on('pageerror', error => errors.push(`${viewport.name}: ${error.message}`));
            await page.goto('http://127.0.0.1:3000/jamal-portfolio/', { waitUntil: 'networkidle' });
            const overflow = await page.evaluate(() => document.documentElement.scrollWidth - innerWidth);
            if (overflow > 2) errors.push(`${viewport.name}: horizontal overflow ${overflow}px`);
            if (await page.locator('h1').count() !== 1) errors.push(`${viewport.name}: invalid h1 count`);
            if (viewport.width <= 1050) {
              await page.locator('[data-menu-open]').click();
              await page.locator('[data-mobile-menu]').waitFor({ state: 'visible' });
              if (await page.locator('[data-menu-link]').count() !== 6) errors.push(`${viewport.name}: menu link count`);
              await page.locator('[data-menu-close]').click();
            }
            await page.locator('[data-theme-button]').click();
            await page.locator('[data-theme="cobalt"]').click();
            if (await page.locator('html').getAttribute('data-theme') !== 'cobalt') errors.push(`${viewport.name}: theme switch`);
            await page.locator('[data-contact-open]').first().click();
            await page.locator('[data-contact-modal]').waitFor({ state: 'visible' });
            await page.locator('[data-contact-close]').last().click();
            await page.locator('[data-contact-modal]').waitFor({ state: 'hidden' });
            await page.close();
          }
          await browser.close();
          if (errors.length) { console.error(errors.join('\n')); process.exit(1); }
          console.log('Responsive interaction audit passed');
          JS
          node /tmp/interaction-audit.mjs
      - name: Run Lighthouse mobile and desktop
        run: |
          CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet \
            --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json --output-path=/tmp/mobile.json
          npx lighthouse http://127.0.0.1:3000/jamal-portfolio/ --quiet \
            --chrome-path="$CHROME_PATH" --chrome-flags="--headless --no-sandbox" --preset=desktop \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json --output-path=/tmp/desktop.json
          node <<'NODE'
          const fs = require('node:fs');
          const read = path => {
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const c = report.categories;
            const a = report.audits;
            return {
              performance: Math.round(c.performance.score * 100),
              accessibility: Math.round(c.accessibility.score * 100),
              bestPractices: Math.round(c['best-practices'].score * 100),
              seo: Math.round(c.seo.score * 100),
              fcp: a['first-contentful-paint'].displayValue,
              lcp: a['largest-contentful-paint'].displayValue,
              tbt: a['total-blocking-time'].displayValue,
              cls: a['cumulative-layout-shift'].displayValue,
              speedIndex: a['speed-index'].displayValue,
            };
          };
          const mobile = read('/tmp/mobile.json');
          const desktop = read('/tmp/desktop.json');
          const md = `# Final performance audit\n\nAudited: ${new Date().toISOString()}\n\n## Lighthouse scores\n\n| Mode | Performance | Accessibility | Best Practices | SEO |\n|---|---:|---:|---:|---:|\n| Mobile | ${mobile.performance} | ${mobile.accessibility} | ${mobile.bestPractices} | ${mobile.seo} |\n| Desktop | ${desktop.performance} | ${desktop.accessibility} | ${desktop.bestPractices} | ${desktop.seo} |\n\n## Mobile metrics\n\n- First Contentful Paint: ${mobile.fcp}\n- Largest Contentful Paint: ${mobile.lcp}\n- Total Blocking Time: ${mobile.tbt}\n- Cumulative Layout Shift: ${mobile.cls}\n- Speed Index: ${mobile.speedIndex}\n\n## Desktop metrics\n\n- First Contentful Paint: ${desktop.fcp}\n- Largest Contentful Paint: ${desktop.lcp}\n- Total Blocking Time: ${desktop.tbt}\n- Cumulative Layout Shift: ${desktop.cls}\n- Speed Index: ${desktop.speedIndex}\n`;
          fs.writeFileSync('FINAL_PERFORMANCE.md', md);
          console.log({ mobile, desktop });
          NODE
      - name: Publish audit result
        if: always()
        run: |
          rm -f .github/FINAL_PERFORMANCE_AUDIT .github/workflows/final-performance-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "audit: publish final responsive performance results" || exit 0
          git pull --rebase origin main
          git push
