name: Agent apply compatibility patch

on:
  push:
    branches: [agent/interactive-portfolio-redesign]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/interactive-portfolio-redesign
          fetch-depth: 0

      - name: Apply focused source patch
        run: node scripts/patch-interactive-page.mjs

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet -- src/app/page.tsx; then
            echo "No page changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.tsx
          git commit -m "fix: use supported portfolio icons"
          git push origin HEAD:agent/interactive-portfolio-redesign
