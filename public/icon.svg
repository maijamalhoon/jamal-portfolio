<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Jamal Yaqoob portfolio icon</title>
  <desc id="desc">JY monogram on a dark rounded square with a lime accent.</desc>
  <defs>
    <linearGradient id="bg" x1="8" y1="4" x2="58" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17171d"/>
      <stop offset="1" stop-color="#070709"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="17" fill="none" stroke="#ffffff" stroke-opacity=".14"/>
  <path d="M47 10a7 7 0 1 1-7 7 7 7 0 0 1 7-7Z" fill="#caff4a" opacity=".18"/>
  <path d="M46.8 13.5a3.5 3.5 0 1 1-3.5 3.5 3.5 3.5 0 0 1 3.5-3.5Z" fill="#caff4a" filter="url(#glow)"/>
  <text x="32" y="42" text-anchor="middle" fill="#f7f5ef" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800" letter-spacing="-2">JY</text>
  <path d="M15 50h34" stroke="#caff4a" stroke-width="3" stroke-linecap="round"/>
</svg>
